name: "Databricks Asset Bundle CD Pipeline"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

# 🔌 Re-engineered Trigger: Fire ONLY when someone opens a Pull Request to merge into these branches
on:
  pull_request:
    branches:
      - main
      - init
      - job-parameters
      - feature/actions-verify

jobs:
  # STAGE 1: Infrastructure Deployment
  deploy_bundle:
    name: "Compile & Deploy Asset Bundle"
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: "Checkout Codefootprint Repository"
        uses: actions/checkout@v4

      # ⚙️ Fixed: Attached to the standard Databricks production channel tag
      - name: "Provision Databricks CLI Engine"
        uses: databricks/setup-cli@main

      # 📁 Fixed: Added working-directory modifier so the CLI knows your bundle is inside /dapp
      - name: "Execute Bundle Deployment"
        working-directory: ./dapp
        run: |
          databricks bundle deploy
        env:
          DATABRICKS_HOST: "https://adb-7405608553806739.19.azuredatabricks.net"
          DATABRICKS_TOKEN: "${{ secrets.DATABRICKS_TOKEN }}"
          DATABRICKS_BUNDLE_ENV: "dev"

  # STAGE 2: Automated Validation Verification Run
  run_pipeline_update:
    name: "Trigger Verification Workflow Execution"
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy_bundle # Blocks Stage 2 from starting until Stage 1 completely succeeds!

    steps:
      - name: "Checkout Codefootprint Repository"
        uses: actions/checkout@v4

      # ⚙️ Fixed: Attached to the standard Databricks production channel tag
      - name: "Provision Databricks CLI Engine"
        uses: databricks/setup-cli@main

      # 📁 Fixed: Added working-directory modifier so the CLI knows your bundle is inside /dapp
      - name: "Trigger Active Verification Run"
        working-directory: ./dapp
        run: |
          databricks bundle run job_1
        env:
          DATABRICKS_HOST: "https://adb-7405608553806739.19.azuredatabricks.net"
          DATABRICKS_TOKEN: "${{ secrets.DATABRICKS_TOKEN }}"
          DATABRICKS_BUNDLE_ENV: "dev"