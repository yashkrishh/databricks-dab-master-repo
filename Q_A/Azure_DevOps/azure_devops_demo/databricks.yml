# This is a Databricks asset bundle definition for azure_devops_demo.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: azure_devops_demo
  uuid: 4b34e966-c686-4b42-a65f-5ac6d4087c30

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405608553806739.19.azuredatabricks.net
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405608553806739.19.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/yashkrishh1991@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/yashkrishh1991@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: yashkrishh1991@gmail.com
        level: CAN_MANAGE
