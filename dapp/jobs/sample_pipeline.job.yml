resources:
  jobs:
    sample_pipeline_job:
      name: "[${bundle.target}] Modular Pipeline Job"
      job_clusters:
        - job_cluster_key: bronze_cluster
          new_cluster: ${var.low_cost_compute}
        - job_cluster_key: gold_cluster
          new_cluster: ${var.high_perf_compute}
      tasks:
        - task_key: run_bronze_ingest
          job_cluster_key: bronze_cluster
          notebook_task:
            notebook_path: ../src/sample_notebook.ipynb
            # 🔌 INJECTION STEP: Defining task-level runtime parameters
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              notebook_param: "50.0"

        - task_key: run_gold_aggregation
          job_cluster_key: gold_cluster
          depends_on:
            - task_key: run_bronze_ingest
          notebook_task:
            notebook_path: ../src/sample_notebook.ipynb

        - task_key: run_instant_developer_test
          existing_cluster_id: ${var.existing_workspace_cluster}
          notebook_task:
            notebook_path: ../src/sample_notebook.ipynb
            # 🔌 FIX: Forward the missing widget key!
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              notebook_param: "2" # Add this line!