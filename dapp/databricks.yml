# This is a Databricks asset bundle definition for dapp.
bundle:
  name: dapp
  uuid: 2fb134f3-f8ce-4bf4-b969-d03820bf7fa3

include:
  - "jobs/*.job.yml"
  - "clusters/*.yml"

# Variable declarations. Kept safely intact!
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  environment_tier:
    description: "The operational classification tier of this deployment cluster"
    default: "DEVELOPMENT_SANDBOX"
  target_cluster_id:
    description: "The active compute node pool target for execution"
    default: "DEFAULT_SERVERLESS" # Baseline fallback

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405608553806739.19.azuredatabricks.net
      # 🛡️ FIXED: root_path is now correctly indented under the workspace block
      root_path: /Workspace/Users/yashkrishh1991@gmail.com/.bundle/${bundle.name}/dev
    variables:
      catalog: dbx_workspace_dev
      schema: ${workspace.current_user.short_name}

  prod:
    mode: production
    workspace:
      host: https://adb-prod-workspace-production-url.net
      root_path: /Shared/deployments/production_pipelines/${bundle.name}/prod
    # 🛡️ OVERRIDE STEP: Injecting production custom variable states
    variables:
      catalog: dbx_workspace_dev
      schema: prod
      environment_tier: "PRODUCTION_ENTERPRISE"
    permissions:
      - user_name: yashkrishh1991@gmail.com
        level: CAN_MANAGE